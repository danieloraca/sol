<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sol</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <p class="eyebrow">Desktop preview</p>
          <h1>Sol</h1>
          <p class="tagline">
            A Rust media app starter with a living catalog and playback
            sources.<br />Thanks, Bogdan.
          </p>
        </div>

        <nav class="filters">
          <button class="filter is-active" data-filter="">All</button>
          <button class="filter" data-filter="movie">Movies</button>
          <button class="filter" data-filter="series">Series</button>
          <button class="filter" data-filter="channel">Channels</button>
        </nav>

        <label class="search">
          <span>Search catalog</span>
          <div class="search-row">
            <input
              id="search"
              type="search"
              placeholder="Try atlas, ambient, sci-fi..."
            />
            <button id="search-button" class="ghost-button search-button" type="button">Search</button>
          </div>
          <p id="search-feedback" class="meta"></p>
        </label>

        <section class="addon-manager">
          <div class="section-heading">
            <p class="eyebrow">Addons</p>
            <h2>Install URLs</h2>
          </div>
          <label class="search">
            <span>Manifest URL</span>
            <input
              id="addon-url"
              type="url"
              placeholder="https://example.com/manifest.json"
            />
          </label>
          <div class="control-buttons">
            <button class="primary-button" id="install-addon">Install addon</button>
          </div>
          <p id="addon-feedback" class="meta"></p>
          <div id="addons-list" class="addon-list"></div>
          <div id="addon-details" class="addon-details"></div>
        </section>
      </aside>

      <main class="content">
        <div id="main-view" class="main-view">
          <section class="hero" id="hero"></section>

          <section>
            <div class="section-heading">
              <p class="eyebrow">Home feed</p>
              <h2>Trending now</h2>
            </div>
            <div id="trending" class="rail"></div>
          </section>

          <section>
            <div class="section-heading">
              <p class="eyebrow">Resume</p>
              <h2>Continue watching</h2>
            </div>
            <div id="continue-watching" class="rail"></div>
          </section>

          <section>
            <div class="section-heading">
              <p class="eyebrow">Catalog</p>
              <h2>Browse library</h2>
            </div>
            <div id="catalog" class="catalog-grid"></div>
          </section>
        </div>

        <section id="search-view" class="search-view is-hidden" aria-live="polite">
          <div class="section-heading search-view-heading">
            <button id="search-back" class="ghost-button" type="button">Back</button>
            <div>
              <p class="eyebrow">Search</p>
              <h2 id="search-results-title">Results</h2>
            </div>
          </div>
          <p id="search-results-summary" class="meta"></p>
          <div id="search-results" class="catalog-grid"></div>
        </section>

        <section id="player-view" class="player-view is-hidden" aria-live="polite">
          <div class="section-heading player-view-heading">
            <button id="player-back" class="ghost-button" type="button">Back</button>
            <div>
              <p class="eyebrow">Playback</p>
              <h2>Player controls</h2>
            </div>
          </div>

          <section class="player-shell">
            <div class="player-stage" id="player-stage"></div>

            <aside class="player-sidebar">
              <div id="player-details" class="player-details"></div>
              <div id="streams" class="streams empty">
                Select a title to inspect its stream sources.
              </div>
            </aside>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
